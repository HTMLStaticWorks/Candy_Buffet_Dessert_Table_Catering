<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SweetNest</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
            padding: 20px;
        }
        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(248, 200, 220, 0.2);
        }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <div class="auth-toggles">
        <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
        </button>
        <button id="rtl-toggle" class="rtl-toggle" title="Toggle RTL">
            <span>RTL</span>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-5">
                <a href="index.html" class="footer-logo">
                    <img src="assets/images/logo.png" alt="SweetNest Logo">
                </a>
                <h2 class="mt-3">Join SweetNest</h2>
                <p class="text-muted">Create an account to start planning your event</p>
            </div>
            <form>
                <div class="form-floating mb-4">
                    <input type="text" class="form-control" id="firstname" placeholder="Jane">
                    <label for="firstname">First Name</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="text" class="form-control" id="lastname" placeholder="Doe">
                    <label for="lastname">Last Name</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="email" class="form-control" id="email" placeholder="jane@example.com">
                    <label for="email">Email Address</label>
                </div>
                <div class="form-floating mb-4 password-field-container">
                    <input type="password" class="form-control" id="password" placeholder="••••••••">
                    <label for="password">Password</label>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-floating mb-4 password-field-container">
                    <input type="password" class="form-control" id="confirm_password" placeholder="••••••••">
                    <label for="confirm_password">Confirm Password</label>
                    <button type="button" class="password-toggle" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-check mb-4">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-primary-pink">Terms & Conditions</a> and <a href="#" class="text-primary-pink">Privacy Policy</a></label>
                </div>
                <button type="submit" class="btn-luxury w-100 py-3 mb-4">Sign Up</button>
                
                <div class="social-separator">
                    <span class="small text-muted px-2">Or sign up with</span>
                </div>

                <div class="social-buttons mb-4">
                    <a href="#" class="btn-social btn-google">
                        <i class="fab fa-google text-danger"></i>
                        <span>Google</span>
                    </a>
                    <a href="#" class="btn-social btn-apple">
                        <i class="fab fa-apple"></i>
                        <span>Apple</span>
                    </a>
                </div>

                <div class="text-center">
                    <p class="small text-muted">Already have an account? <a href="login.html" class="text-primary-pink fw-bold text-decoration-none">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
