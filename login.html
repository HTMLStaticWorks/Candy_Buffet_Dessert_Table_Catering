<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SweetNest</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body class="auth-page">

    <div class="auth-toggles">
        <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
        </button>
        <button id="rtl-toggle" class="rtl-toggle" title="Toggle RTL">
            <span>RTL</span>
        </button>
    </div>

    <div class="auth-wrapper">
        <!-- Left Side: Image (Desktop Only) -->
        <div class="auth-image-side">
            <div class="auth-image-content">
                <h1>Crafting Sweet <br>Memories</h1>
                <p>Welcome back to SweetNest. Your perfect dessert table is just a few clicks away.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="auth-form-side">
            <div class="bg-blob blob-1"></div>
            <div class="bg-blob blob-2"></div>

            <div class="auth-card">
                <div class="text-center mb-5">
                    <a href="index.html" class="footer-logo">
                        <img src="assets/images/logo.png" alt="SweetNest Logo">
                    </a>
                    <h2 class="mt-3">Welcome Back</h2>
                    <p class="text-muted">Please enter your details to login</p>
                </div>
                <form>
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="email" placeholder="hello@example.com">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="form-floating mb-4 password-field-container">
                        <input type="password" class="form-control" id="password" placeholder="••••••••">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="auth-remember-forgot mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="text-primary-orange text-decoration-none small">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-luxury w-100 py-3 mb-4">Login</button>
                    
                    <div class="social-separator">
                        <span class="small text-muted px-2">Or login with</span>
                    </div>

                    <div class="social-buttons mb-4">
                        <a href="#" class="btn-social btn-google">
                            <i class="fab fa-google text-danger"></i>
                            <span>Google</span>
                        </a>
                        <a href="#" class="btn-social btn-apple">
                            <i class="fab fa-apple"></i>
                            <span>Apple</span>
                        </a>
                    </div>

                    <div class="text-center">
                        <p class="small text-muted">Don't have an account? <a href="signup.html" class="text-primary-orange fw-bold text-decoration-none">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
