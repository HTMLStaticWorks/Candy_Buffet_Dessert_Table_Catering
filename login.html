<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SweetNest</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
            padding: 20px;
        }
        .auth-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(248, 200, 220, 0.2);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-5">
                <a href="index.html" class="footer-logo">SweetNest</a>
                <h2 class="mt-3">Welcome Back</h2>
                <p class="text-muted">Please enter your details to login</p>
            </div>
            <form>
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="hello@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="text-primary-pink text-decoration-none small">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-luxury w-100 py-3 mb-4">Login</button>
                <div class="text-center">
                    <p class="small text-muted">Don't have an account? <a href="signup.html" class="text-primary-pink fw-bold text-decoration-none">Sign Up</a></p>
                </div>
                <div class="mt-4 d-flex justify-content-center">
                    <ul class="navbar-nav flex-row gap-3">
                        <li class="nav-item">
                            <div class="toggle-group">
                                <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                                    <i class="fas fa-moon"></i>
                                    <i class="fas fa-sun"></i>
                                </button>
                                <button id="rtl-toggle" class="rtl-toggle" title="Toggle RTL">
                                    <span>RTL</span>
                                </button>
                            </div>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
